{% extends 'products/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card border-0 shadow-sm p-4 rounded-4">
            <h2 class="fw-bold text-center mb-4">Login</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg fw-bold rounded-3">Login</button>
                    <p class="text-center mt-3">Don't have an account? <a href="{% url 'signup' %}">Sign up now</a></p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

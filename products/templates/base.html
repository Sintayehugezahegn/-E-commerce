<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section { background: #007bff; color: white; padding: 60px 0; text-align: center; margin-bottom: 30px; }
    </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">ETHIO SHOP</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'cart_detail' %}">Cart ({% if cart %}{{ cart|length }}{% else %}0{% endif %})</a>
                <a class="nav-link" href="{% url 'profile' %}">My Account</a>
            </div>
        </div>
    </nav>

    {% block hero %}{% endblock %}

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>

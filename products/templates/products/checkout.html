{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-lg p-4">
            <h2 class="text-center mb-4">Checkout</h2>
            <div class="alert alert-info small">
                Pay to: CBE 1000XXXXXXXX / Telebirr 09XXXXXXXX
            </div>
            <form method="POST">
                {% csrf_token %}
                <input type="text" name="first_name" class="form-control mb-3" placeholder="First Name" required>
                <input type="text" name="last_name" class="form-control mb-3" placeholder="Last Name" required>
                
                <label class="fw-bold">Payment Method</label>
                <select name="bank_name" class="form-select mb-3" required>
                    <option value="Telebirr">Telebirr</option>
                    <option value="CBE">CBE (Commercial Bank)</option>
                    <option value="Abyssinia">Bank of Abyssinia</option>
                    <option value="Awash">Awash Bank</option>
                </select>
                
                <input type="text" name="payment_reference" class="form-control mb-3" placeholder="Transaction ID (e.g. ABC123XYZ)" required>
                <textarea name="address" class="form-control mb-3" placeholder="Shipping Address" required></textarea>
                <button type="submit" class="btn btn-success w-100 btn-lg">Pay & Place Order</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}

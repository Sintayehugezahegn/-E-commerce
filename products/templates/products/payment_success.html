{% extends 'base.html' %}

{% block content %}
<div class="container text-center py-5">
    <div class="card shadow-sm p-4">
        <div class="mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="green" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h2>Payment Successful!</h2>
        <p class="lead">Thank you for your order, <strong>{{ order.first_name }}</strong>.</p>
        <p>Your Order ID is: <strong>#{{ order.id }}</strong></p>
        <p>A confirmation email has been sent to {{ order.email }}.</p>
        <div class="mt-4">
            <a href="{% url 'product_list' %}" class="btn btn-primary">Continue Shopping</a>
            <a href="{% url 'profile' %}" class="btn btn-outline-secondary">View Order History</a>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Shop | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: 0.3s; border: none; border-radius: 15px; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 shadow">
        <div class="container">
            <a class="navbar-brand" href="{% url 'product_list' %}">ETHIO-SHOP</a>
            <form class="d-flex ms-auto" action="{% url 'product_list' %}" method="get">
                <input class="form-control me-2" type="search" name="q" placeholder="Search..." aria-label="Search">
                <button class="btn btn-outline-light" type="submit">Search</button>
            </form>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <!-- Sidebar for Categories -->
            <div class="col-md-3">
                <div class="list-group shadow-sm">
                    <a href="{% url 'product_list' %}" class="list-group-item list-group-item-action">All Categories</a>
                    {% for cat in categories %}
                    <a href="?category={{ cat.id }}" class="list-group-item list-group-item-action">{{ cat.name }}</a>
                    {% endfor %}
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-md-9">
                <div class="row">
                    {% for product in products %}
                    <div class="col-md-4 mb-4">
                        <div class="card h-100 product-card shadow-sm text-center">
                            {% if product.image %}
                                <img src="{{ product.image.url }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                            {% endif %}
                            <div class="card-body">
                                <h5>{{ product.name }}</h5>
                                <p class="text-primary fw-bold">${{ product.price }}</p>
                                <a href="{% url 'product_detail' product.pk %}" class="btn btn-dark btn-sm w-100">Details</a>
                            </div>
                        </div>
                    </div>
                    {% empty %}
                    <div class="col-12 text-center mt-5"><h5>No products found.</h5></div>
                    {% endfor %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .navbar { background: #1a1a1a !important; }
        .product-card { transition: 0.3s; border-radius: 12px; border: none; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
    <!-- በ base.html ውስጥ ካለው Navbar ላይ ይሄን ጨምር -->
<li class="nav-item">
    <a class="nav-link fw-bold" href="{% url 'profile' %}">👤 My Profile</a>
</li>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="{% url 'product_list' %}">ETHIO-SHOP</a>
            <div class="d-flex align-items-center">
                {% if user.is_authenticated %}
                    <a href="{% url 'cart_detail' %}" class="btn btn-outline-light btn-sm me-3">🛒 Cart ({{ cart|length }})</a>
                    <form action="{% url 'logout' %}" method="post">
                        {% csrf_token %}<button class="btn btn-danger btn-sm rounded-pill">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-sm btn-outline-light me-2">Login</a>
                    <a href="{% url 'signup' %}" class="btn btn-sm btn-primary">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <div class="container mt-4"> {% block content %} {% endblock %} </div>
</body>
</html>

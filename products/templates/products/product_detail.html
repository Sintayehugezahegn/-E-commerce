<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{{ product.name }} - Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container"><a class="navbar-brand" href="/">ETHIO-SHOP</a></div>
    </nav>

    <div class="container mt-5">
        <div class="row bg-white p-4 shadow-sm rounded border">
            <!-- የምርቱ ፎቶ -->
            <div class="col-md-6 text-center">
                {% if product.image %}
                    <img src="{{ product.image.url }}" class="img-fluid rounded shadow-sm" alt="{{ product.name }}" style="max-height: 450px;">
                {% else %}
                    <div class="bg-secondary text-white d-flex align-items-center justify-content-center rounded" style="height: 300px;">No Image</div>
                {% endif %}
            </div>
            
            <!-- የምርቱ ዝርዝር መረጃ -->
            <div class="col-md-6">
                <h1 class="display-5 font-weight-bold">{{ product.name }}</h1>
                <h2 class="text-primary mt-3">${{ product.price }}</h2>
                <hr>
                <h5>ስለ ምርቱ ማብራሪያ፦</h5>
                <p class="lead text-muted">{{ product.description }}</p>
                <div class="mt-4">
                    <p><strong>የተቀረው ብዛት (Stock):</strong> {{ product.stock }}</p>
                    <button class="btn btn-success btn-lg px-5">Add to Cart</button>
                    <a href="/" class="btn btn-outline-secondary btn-lg ms-2">Back</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
